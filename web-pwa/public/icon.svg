<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  <!-- Inner Border Glow -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#334155" stroke-width="4" opacity="0.5" />
  <!-- Bank / Finance Symbol -->
  <g transform="translate(128, 128) scale(1.6)">
    <!-- Roof -->
    <path d="M80 15 L10 50 L150 50 Z" fill="url(#logoGrad)" />
    <!-- Architrave -->
    <rect x="20" y="54" width="120" height="10" rx="2" fill="#3B82F6" />
    <!-- Pillars -->
    <rect x="32" y="68" width="12" height="50" rx="2" fill="#60A5FA" />
    <rect x="64" y="68" width="12" height="50" rx="2" fill="#60A5FA" />
    <rect x="96" y="68" width="12" height="50" rx="2" fill="#60A5FA" />
    <rect x="128" y="68" width="12" height="50" rx="2" fill="#60A5FA" />
    <!-- Base -->
    <rect x="15" y="122" width="130" height="12" rx="2" fill="url(#logoGrad)" />
  </g>
</svg>
